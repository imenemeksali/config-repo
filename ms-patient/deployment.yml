apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ms-patient
  name: ms-patient
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-patient
  template:
    metadata:
      labels:
        app: ms-patient
    spec:
      containers:
      - name: ms-patient-container
        image: 192.168.80.1:5000/ms-patient-image:latest
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  namespace: ms-patient
  name: ms-patient
spec:
  selector:
    app: ms-patient
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
